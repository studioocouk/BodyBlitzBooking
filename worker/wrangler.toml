name = "studioo-booking-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "studioo-db"
database_id = "YOUR_D1_DATABASE_ID"

[vars]
STRIPE_PUBLISHABLE_KEY = "pk_live_YOUR_KEY"
WIDGET_ORIGIN = "https://bbwidget.pages.dev"
ADMIN_ORIGIN = "https://bbadmin-853.pages.dev"

[triggers]
crons = ["0 7 * * *", "*/15 * * * *"]
# "0 7 * * *"    — morning reminders at 07:00 UTC daily
# "*/15 * * * *" — pending booking cleanup every 15 minutes

# Secrets — set via Cloudflare dashboard (Variables and Secrets):
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# ADMIN_PASSWORD
